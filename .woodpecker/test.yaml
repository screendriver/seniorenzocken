---
when:
    - event: [push, manual]

labels:
    platform: linux/amd64

steps:
    - name: test
      image: node:26.5.0
      commands:
          - npm clean-install
          - npx just test
          - npx just generate-database-migrations

    - name: fail-on-git-status
      image: alpine/git:v2.54.0
      commands:
          - git status
          - test -z "$(git status --porcelain)"
