name: Main

on: [push]

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 18
            - name: Install dependencies
              run: npm clean-install
            - name: Check source code
              run: |
                  npm run lint
                  npm run compile
            - name: Run unit tests
              run: npm run test:unit:coverage
