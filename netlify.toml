[build]
    publish = "target/dist/"
    command = "npm run build"

[[headers]]
    for = "/manifest.webmanifest"
    [headers.values]
        Content-Type = "application/manifest+json"
    for = "/audio/*"
    [headers.values]
        Cache-Control = '''
        public,
        max-age=604800,
        must-revalidate'''
